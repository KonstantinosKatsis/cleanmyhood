services:
  server:
    image: "nginx:stable-alpine"
    restart: on-failure
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html/backhood:delegated
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
  php:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html/backhood:delegated
      - ./docker/src/custom.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/src/php-additions.ini:/usr/local/etc/php/conf.d/php-additions.ini
    environment:
      - XDEBUG_MODE=debug
      - XDEBUG_CONFIG=client_host=host.docker.internal client_port=9003 idekey=PHPSTORM
      - PHP_IDE_CONFIG=serverName=localhost
    restart: on-failure
    user: 1000:1000
  db-hood:
    platform: linux/x86_64
    container_name: db-hood
    image: mariadb:10.5.18
    restart: always
    volumes:
      - ./docker/env/dump.sql:/docker-entrypoint-initdb.d/dump.sql
      - dbdata:/var/lib/mysql
      - ./docker/env/mariadb/my.cnf:/etc/mysql/my.cnf
    environment:
      MYSQL_ROOT_PASSWORD: qwerty123456
    ports:
      - 3306:3306
volumes:
  dbdata:
    driver: local
